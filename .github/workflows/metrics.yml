name: metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # O token que você configurou nos Secrets do repositório
          token: ${{ secrets.METRICS_TOKEN }}

          # Opções para replicar a imagem
          user: swwt0y
          template: classic
          base: header, community, repositories, metadata
          config_timezone: America/Sao_Paulo
